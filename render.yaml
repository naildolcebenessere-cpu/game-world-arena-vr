services:
  - type: web
    name: game-world-arena-vr
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: ADMIN_EMAIL
        value: admin@arena.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
