{% extends 'base.html' %}{% block content %}
<header class="topbar"><div><span>SICUREZZA</span><h1>Cambia password</h1><p>Imposta una password più sicura prima di pubblicare la web app online.</p></div></header>
<section class="panel">
  <form method="post" class="form gridform">
    <input name="current_password" type="password" placeholder="Password attuale" required>
    <input name="new_password" type="password" placeholder="Nuova password, almeno 8 caratteri" required>
    <input name="confirm_password" type="password" placeholder="Conferma nuova password" required>
    <button>Aggiorna password</button>
  </form>
</section>
{% endblock %}
