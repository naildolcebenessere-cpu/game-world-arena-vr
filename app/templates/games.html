{% extends 'base.html' %}{% block content %}<h1>Giochi e pacchetti</h1><div class="panel"><form method="post" enctype="multipart/form-data" class="form gridform"><input name="title" placeholder="Titolo gioco" required><input name="category" placeholder="Categoria" value="VR"><input name="players" placeholder="Giocatori" value="1-4"><input name="duration" type="number" placeholder="Durata"><input name="price" type="number" step="0.01" placeholder="Prezzo"><input type="file" name="cover" accept="image/*"><label class="check"><input type="checkbox" name="active" checked> Visibile sul sito</label><textarea name="description" placeholder="Descrizione"></textarea><button class="btn primary">Aggiungi gioco</button></form></div><div class="cards">{% for r in rows %}<div class="card">{% if r.cover %}<img class="card-cover" src="{{url_for('static', filename='uploads/' + r.cover)}}">{% endif %}<span>{{r.category}}</span><h3>{{r.title}}</h3><p>{{r.description}}</p><b>€ {{r.price}}</b><small>{{r.players}} giocatori · {{r.duration}} min · {{'attivo' if r.active else 'nascosto'}}</small></div>{% endfor %}</div>{% endblock %}
