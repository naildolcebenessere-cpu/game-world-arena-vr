{% extends 'base.html' %}{% block content %}<div class="topbar"><div><span>MEDIA</span><h1>Immagini caricate</h1><p>Carica immagini da usare nel sito pubblico, nelle pagine, nelle sezioni e nei giochi.</p></div></div><div class="panel"><form method="post" enctype="multipart/form-data" class="form gridform"><input type="file" name="image" accept="image/*" required><input name="media_title" placeholder="Titolo immagine"><input name="media_alt" placeholder="Testo alternativo"><button class="btn primary">Carica immagine</button></form></div><div class="media-grid">{% for r in rows %}<div class="media-card"><img src="{{url_for('static', filename='uploads/' + r.filename)}}"><b>{{r.title or r.original_name}}</b><small>{{r.filename}}</small><code>/static/uploads/{{r.filename}}</code></div>{% endfor %}</div>{% endblock %}
