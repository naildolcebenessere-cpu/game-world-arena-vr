{% extends 'base.html' %}{% block content %}<h1>Eventi e compleanni</h1><div class="panel"><form method="post" class="form gridform"><input name="title" placeholder="Titolo evento" required><input name="event_date" type="date" required><input name="start_time" type="time" required><input name="end_time" type="time" required><input name="customer_name" placeholder="Referente"><input name="phone" placeholder="Telefono"><select name="status"><option value="draft">Bozza</option><option value="confirmed">Confermato</option><option value="cancelled">Annullato</option></select><input name="people" type="number" placeholder="Persone"><input name="catering" placeholder="Catering / note torta"><input name="total" type="number" step="0.01" placeholder="Totale"><textarea name="notes" placeholder="Note"></textarea><button>Salva evento</button></form></div><div class="panel"><table><tr><th>Evento</th><th>Data</th><th>Orario</th><th>Cliente</th><th>Stato</th><th>Totale</th></tr>{% for r in rows %}<tr><td>{{r.title}}</td><td>{{r.event_date}}</td><td>{{r.start_time}}-{{r.end_time}}</td><td>{{r.customer_name}}<br><small>{{r.phone}}</small></td><td>{{r.status}}</td><td>€ {{r.total}}</td></tr>{% endfor %}</table></div>{% endblock %}
