{% extends 'base.html' %}{% block content %}<h1>Prenotazioni</h1><div class="panel"><form method="post" class="form gridform"><input name="customer_name" placeholder="Nome cliente" required><input name="phone" placeholder="Telefono"><input name="booking_date" type="date" required><input name="start_time" type="time" required><input name="end_time" type="time" required><input name="service" placeholder="Servizio/Pacchetto" required><select name="status"><option>confirmed</option><option>draft</option><option>cancelled</option></select><input name="people" type="number" placeholder="Persone"><input name="deposit" type="number" step="0.01" placeholder="Acconto"><input name="total" type="number" step="0.01" placeholder="Totale"><textarea name="notes" placeholder="Note"></textarea><button>Salva prenotazione</button></form></div><div class="panel"><table><tr><th>Cliente</th><th>Data</th><th>Ora</th><th>Servizio</th><th>Totale</th><th>Stato</th></tr>{% for r in rows %}<tr><td>{{r.customer_name}}<br><small>{{r.phone}}</small></td><td>{{r.booking_date}}</td><td>{{r.start_time}}-{{r.end_time}}</td><td>{{r.service}}</td><td>€ {{r.total}}</td><td>{{r.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
