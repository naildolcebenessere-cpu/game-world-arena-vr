{% extends 'base.html' %}{% block content %}<div class="topbar"><div><span>SEZIONE SITO</span><h1>{{'Nuova sezione' if not section else 'Modifica sezione'}}</h1><p>Pagina: <b>{{page.title}}</b>. Puoi inserire testo, immagine, pulsante e ordine.</p></div><a class="btn ghost" href="{{url_for('main.cms_page_edit', id=page.id)}}">Torna alla pagina</a></div>
<div class="panel"><form method="post" enctype="multipart/form-data" class="form gridform wide"><label>Tipo sezione<select name="section_type"><option value="text_image" {% if section and section.section_type=='text_image' %}selected{% endif %}>Testo + immagine</option><option value="hero" {% if section and section.section_type=='hero' %}selected{% endif %}>Hero / grande</option><option value="cards" {% if section and section.section_type=='cards' %}selected{% endif %}>Cards / evidenza</option><option value="text" {% if section and section.section_type=='text' %}selected{% endif %}>Solo testo</option></select></label><label>Ordine<input type="number" name="sort_order" value="{{section.sort_order if section else 0}}"></label><label>Kicker / etichetta<input name="kicker" value="{{section.kicker if section else ''}}" placeholder="es. PROMO, EVENTI, VR"></label><label>Titolo<input name="title" value="{{section.title if section else ''}}" required></label><label class="fullrow">Testo<textarea name="body" rows="8">{{section.body if section else ''}}</textarea></label><label>Immagine sezione<input type="file" name="image" accept="image/*"></label>{% if section and section.image %}<div class="thumbbox"><img src="{{url_for('static', filename='uploads/' + section.image)}}"></div>{% endif %}<label>Testo pulsante<input name="button_text" value="{{section.button_text if section else ''}}" placeholder="es. Prenota ora"></label><label>Link pulsante<input name="button_url" value="{{section.button_url if section else ''}}" placeholder="/prenota"></label><label class="check"><input type="checkbox" name="active" {% if not section or section.active %}checked{% endif %}> Sezione attiva</label><button class="btn primary">Salva sezione</button></form></div>{% endblock %}
