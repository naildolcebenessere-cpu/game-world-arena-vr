{% extends 'base.html' %}{% block content %}<h1>Registro partite e timer</h1><div class="panel"><form method="post" class="form gridform"><input name="customer_name" placeholder="Cliente" required><input name="station" placeholder="Postazione / Arena" required><select name="game_title">{% for g in games %}<option>{{g.title}}</option>{% endfor %}</select><select name="package_name">{% for p in packs %}<option data-min="{{p.minutes}}" data-price="{{p.price}}">{{p.name}}</option>{% endfor %}</select><input name="minutes" type="number" placeholder="Minuti" value="30"><input name="amount" type="number" step="0.01" placeholder="Importo"><select name="paid_method"><option>Contanti</option><option>POS</option><option>Bonifico</option></select><textarea name="notes" placeholder="Note"></textarea><button>Avvia sessione</button></form></div><div class="cards">{% for r in rows %}<div class="card session {{r.status}}"><span>{{r.station}}</span><h3>{{r.customer_name}}</h3><p>{{r.game_title}} · {{r.package_name}}</p><b class="countdown" data-end="{{r.end_at}}">--:--</b><small>{{r.start_at}} → {{r.end_at}}</small>{% if r.status=='running' %}<form method="post" action="{{url_for('main.close_session',id=r.id)}}"><button>Chiudi</button></form>{% else %}<em>Chiusa</em>{% endif %}</div>{% endfor %}</div>{% endblock %}
